name: Redirect GitHub Pages to textbook.realmusictheory.com

# The app now lives at https://textbook.realmusictheory.com/ (Cloudflare).
# GitHub Pages just serves a redirect stub so the old URL forwards there.

on:
  push:
    branches:
      - main

jobs:
  redirect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy redirect to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-redirect
